<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MES Production - Strategy Interface</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; cursor: grab; background: #1a1a2e; }
        canvas:active { cursor: grabbing; }
        #hud {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 10;
        }
        #tooltip {
            position: fixed;
            background: rgba(0,0,0,0.85);
            border: 1px solid #0f0;
            padding: 5px 10px;
            font-size: 11px;
            color: #0f0;
            border-radius: 3px;
            pointer-events: none;
            z-index: 20;
            font-family: monospace;
            white-space: nowrap;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="hud">🔌 MES | FPS: <span id="fps">0</span> | 🖱️ Drag + Scroll</div>
    <div id="tooltip" class="hidden"></div>

    <script src="/js/data/api.js"></script>
    <script src="/js/canvas/core.js"></script>
    <script src="/js/canvas/camera.js"></script>
    <script src="/js/canvas/renderer.js"></script>
    <script src="/js/entities/Indicator.js"></script>
    <script src="/js/entities/Part.js"></script>
    <script src="/js/entities/Box.js"></script>
    <script src="/js/entities/Line.js"></script>
    <script src="/js/systems/grid.js"></script>
    <script src="/js/systems/tooltip.js"></script>
    <script src="/js/systems/selection.js"></script>
    <script src="/js/systems/animation.js"></script>
    <script src="/js/ui/overlay.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
